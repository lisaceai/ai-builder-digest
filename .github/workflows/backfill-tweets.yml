name: Backfill Tweets (Manual)

on:
  workflow_dispatch:
    inputs:
      days_ago:
        description: '回溯天数（默认 7）'
        required: false
        default: '7'
      result_count:
        description: '每位 builder 最多抓取推文数（默认 50）'
        required: false
        default: '50'


jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Trigger Apify Actor
        id: apify
        run: |
          USERS=$(jq -c '.ai_builders' config/users.json)
          DAYS_AGO=${{ github.event.inputs.days_ago }}
          RESULT_COUNT=${{ github.event.inputs.result_count }}

          SINCE_DATE=$(date -u -d "${DAYS_AGO} days ago" +%Y-%m-%d)

          URLS_JSON=$(echo "$USERS" | jq -r '.[]' | while read user; do echo "{\"url\": \"https://x.com/$user\"}"; done | jq -s '.')

          PAYLOAD=$(jq -n \
            --argjson urls "$URLS_JSON" \
            --arg since "$SINCE_DATE" \
            --arg count "$RESULT_COUNT" \
            '{
              "start_urls": $urls,
              "since_date": $since,
              "result_count": $count
            }')

          echo "Since: $SINCE_DATE, result_count: $RESULT_COUNT"
          echo "Payload: $PAYLOAD"

          APIFY_ACTOR_ID=gentle_cloud~twitter-tweets-scraper

          RESPONSE=$(curl -s -X POST "https://api.apify.com/v2/acts/$APIFY_ACTOR_ID/runs?token=${{ secrets.APIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | jq -r '.data.id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Error: Failed to start Apify run. Response: $RESPONSE"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Apify run started: $RUN_ID"

      - name: Wait for Apify to complete
        run: |
          RUN_ID=${{ steps.apify.outputs.run_id }}
          echo "Waiting for Apify run $RUN_ID..."

          MAX_WAIT=900
          WAITED=0

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s "https://api.apify.com/v2/acts/gentle_cloud~twitter-tweets-scraper/runs/$RUN_ID?token=${{ secrets.APIFY_TOKEN }}" \
              | jq -r '.data.status')

            echo "Status: $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Apify run succeeded!"
              break
            elif [ "$STATUS" = "FAILED" ]; then
              echo "Apify run failed!"
              exit 1
            fi

            sleep 15
            WAITED=$((WAITED + 15))
          done

          if [ $WAITED -ge $MAX_WAIT ]; then
            echo "Timeout waiting for Apify!"
            exit 1
          fi

      - name: Get Apify dataset
        run: |
          RUN_ID=${{ steps.apify.outputs.run_id }}

          DATASET_ID=$(curl -s "https://api.apify.com/v2/acts/gentle_cloud~twitter-tweets-scraper/runs/$RUN_ID?token=${{ secrets.APIFY_TOKEN }}" \
            | jq -r '.data.defaultDatasetId')

          echo "Dataset ID: $DATASET_ID"

          curl -s "https://api.apify.com/v2/datasets/$DATASET_ID/items?token=${{ secrets.APIFY_TOKEN }}" \
            -o raw_tweets.json

          echo "Downloaded $(cat raw_tweets.json | jq length) tweets"

      - name: Generate AI summaries
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/summarize.py raw_tweets.json summarized_tweets.json

      - name: Ingest tweets into RAG database
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: |
          python scripts/rag_store.py summarized_tweets.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backfill-archive
          path: |
            raw_tweets.json
            summarized_tweets.json
          retention-days: 7
